<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard — Dangerous Page Blocked</title>
  <link rel="stylesheet" href="warning.css">
</head>
<body>

  <div class="page">
    <div class="card">

      <div class="shield">⚠️</div>

      <h1>Phishing Page Blocked</h1>
      <p class="subtitle">
        PhishGuard has detected that this URL is likely a phishing site and
        blocked it to protect you.
      </p>

      <div class="stats">
        <div class="stat">
          <span class="stat-val danger" id="stat-votes">—</span>
          <span class="stat-lbl">Models Flagged</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-total">—</span>
          <span class="stat-lbl">Total Models</span>
        </div>
        <div class="stat">
          <span class="stat-val danger" id="stat-pct">—</span>
          <span class="stat-lbl">Risk Score</span>
        </div>
      </div>

      <div class="url-box">
        <span class="url-lbl">Blocked URL</span>
        <span class="url-txt" id="stat-url">—</span>
      </div>

      <div class="actions">
        <button class="btn-safe"  onclick="goBack()">← Go Back (Safe)</button>
        <button class="btn-risk"  onclick="proceed()">Proceed Anyway</button>
      </div>

      <div class="footer-links">
        Powered by <strong>PhishGuard</strong> · Quantum-Classical ML ·
        <a href="http://localhost:5000" target="_blank">Open Web App</a>
      </div>

    </div>
  </div>

  <script>
    (function () {
      const p = new URLSearchParams(window.location.search);
      const url   = p.get("url")   || "Unknown URL";
      const votes = parseInt(p.get("votes") || "0", 10);
      const total = parseInt(p.get("total") || "6",  10);
      const pct   = total > 0 ? Math.round(votes / total * 100) : 0;

      document.getElementById("stat-url").textContent   = url;
      document.getElementById("stat-votes").textContent = votes;
      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-pct").textContent   = pct + "%";

      window.goBack = function () { window.history.back(); };
      window.proceed = function () {
        // Validate scheme before redirect to prevent javascript: XSS.
        if (/^https?:\/\//i.test(url)) {
          window.location.href = url;
        }
      };
    })();
  </script>

</body>
</html>
