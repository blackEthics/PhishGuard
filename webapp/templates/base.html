<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PhishGuard{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"
          integrity="sha384-JUh163oCRItcbPme8pYnROHQMC6fNKTBWtRG3I3I0erJkzNgL7uxKlNwcrcFKeqF"
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">&#x1F6E1;&#xFE0F; PhishGuard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">URL Analyser</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/batch' %}active{% endif %}" href="/batch">Batch Scanner</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">Analytics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/visualizer' %}active{% endif %}" href="/visualizer">Quantum Visualizer</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>PhishGuard &copy; 2025 &mdash; Bachelor Final Year Project &mdash; Romanian-American University</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmPVKKxI7bBbNxHh9FJRFGbCZ1t"
          crossorigin="anonymous"></script>
  <!-- Shared utilities loaded first so each page script can use PhishGuard.escHtml etc. -->
  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
